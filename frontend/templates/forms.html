{% comment %}
        Displaying Forms in a Modal
{% endcomment %}
{% load rest_framework %}

<div class="modal fade" id="addModal">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header bg-success">
        <span>
          <h4 class="modal-title text-white">Add New {{page_title}} Record</h4>
        </span>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
          <span class="sr-only">Close</span>
        </button>
      </div>
      <div class="modal-body">
        <form action="#" method="post">
          <div class="container">
            <fieldset class="form-group">
              {% csrf_token %}
              {% render_form form template_pack='drfformbootstrap4/horizontal' %}
            </fieldset>
          </div>
          <input type="submit" class="btn btn-primary shadow" value="Save">
          <button type="button" class="btn btn-secondary shadow-sm" data-dismiss="modal">Close</button>
        </form>
      </div>
    </div><!-- /.modal-content -->
  </div><!-- /.modal-dialog -->
</div><!-- /.modal -->
