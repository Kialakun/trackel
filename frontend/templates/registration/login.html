<!DOCTYPE html>
<html lang="en">
{% load static %}
{% load crispy_forms_tags %}
{% load pwa %}

<head>
  <!--required meta tags-->
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Department of Works - Plant and Transport Division: Database App">
  <meta name="author" content="Mr. Kialakun Galgal">
  {% progressive_web_app_meta %}

  <title>TrackEL</title>
    <!-- Page level plugin CSS-->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
</head>

<body class="bg-success">
  {% if user.authenticated %}
  <h1>Hi {{ user.username }}</h1>
  <p><a href="{% url 'logout' %}">Logout</a></p>
  {% else %}
  <div class="d-flex mt-5 justify-content-center">
    <h1 class="text-white">TrackEL</h1>
  </div>
  <div class="d-flex flex-row justify-content-center">
    <p class="text-white font-italic small">Extract Loss Tracker</p>
  </div>
  <div class="d-flex justify-content-center">
    <div class="card mt-5 mb-5 shadow-lg">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form | crispy }}
          <input class="btn btn-outline-success m-3" type="submit" value="Login" />
        </form>
      </div>
      </div>
  </div>
  <!-- Bootstrap core JavaScript-->
  <script src="{% static 'js/jquery.min.js' %}"></script>
  <script src="{% static 'js/bootstrap.min.js' %}"></script>
  {% endif %}
</body>
</html>
